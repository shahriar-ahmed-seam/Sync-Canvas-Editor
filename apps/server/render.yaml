# Render blueprint for the Sync-Canvas WebSocket backend + Redis.
# Deploy: push to a repo, then "New > Blueprint" in Render and point at this file.
services:
  - type: web
    name: sync-canvas-server
    runtime: node
    plan: starter # WebSockets need a non-sleeping instance; free tier idles out.
    rootDir: apps/server
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: "10000"
      - key: SNAPSHOT_INTERVAL_MS
        value: "10000"
      - key: BOARD_TTL_SECONDS
        value: "0"
      - key: CORS_ORIGIN
        sync: false # set to your Vercel URL in the dashboard
      - key: REDIS_URL
        fromService:
          type: redis
          name: sync-canvas-redis
          property: connectionString

  - type: redis
    name: sync-canvas-redis
    plan: starter
    maxmemoryPolicy: noeviction # boards must not be silently evicted
    ipAllowList: [] # only reachable from within Render's network
